<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — منظومة الموردين</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{--bg:#07090f;--bg3:#111827;--border:#1c2a40;--g:#00d4a0;--g2:#00a87e;--t:#e2eaf6;--ts:#6b7fa3;--r:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background-image:radial-gradient(circle at 20% 20%,rgba(0,212,160,.06),transparent 40%),radial-gradient(circle at 80% 80%,rgba(59,130,246,.05),transparent 40%)}
.box{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:38px 34px;width:400px;max-width:100%}
.logo{text-align:center;margin-bottom:26px}
.logo-ic{font-size:42px;margin-bottom:8px}
.logo h1{font-size:19px;font-weight:900;color:var(--g)}
.logo p{font-size:12px;color:var(--ts);margin-top:4px}
.fg{margin-bottom:16px}
.fl{font-size:12px;color:var(--ts);margin-bottom:6px;display:block;font-weight:600}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--t);padding:11px 14px;border-radius:9px;font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:.15s}
.fi:focus{border-color:var(--g)}
.btn{width:100%;padding:12px;border:none;border-radius:9px;background:var(--g);color:#000;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:6px}
.btn:hover{background:var(--g2)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{margin-top:16px;padding:11px 14px;border-radius:9px;font-size:13px;display:none}
.msg.err{display:block;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--r)}
.msg.ok{display:block;background:rgba(0,212,160,.1);border:1px solid rgba(0,212,160,.25);color:var(--g)}
.foot{text-align:center;margin-top:20px;font-size:11px;color:var(--ts)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-ic">🏪</div>
    <h1>منظومة إدارة الموردين</h1>
    <p>سجّل الدخول للمتابعة</p>
  </div>
  <form id="loginForm" onsubmit="return false">
    <div class="fg">
      <label class="fl">البريد الإلكتروني</label>
      <input class="fi" id="email" type="email" placeholder="name@company.ly" autocomplete="username" required>
    </div>
    <div class="fg">
      <label class="fl">كلمة المرور</label>
      <input class="fi" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">دخول</button>
  </form>
  <div class="msg" id="msg"></div>
  <div class="foot">محمي بنظام مصادقة Supabase · جميع كلمات المرور مُعمّاة</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// لو المستخدم مسجّل دخول بالفعل، حوّله مباشرة للمنظومة
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (session) location.href = 'app.html';
})();

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type;
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('loginBtn');
  if (!email || !pass) { showMsg('يرجى إدخال البريد وكلمة المرور', 'err'); return; }

  btn.disabled = true;
  btn.innerHTML = 'جارٍ التحقق...<span class="spinner"></span>';

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    showMsg('بيانات الدخول غير صحيحة. تأكد من البريد وكلمة المرور.', 'err');
    btn.disabled = false; btn.textContent = 'دخول';
  } else {
    showMsg('✓ تم تسجيل الدخول، جارٍ التحويل...', 'ok');
    setTimeout(() => location.href = 'app.html', 600);
  }
}

// دخول بزر Enter
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
